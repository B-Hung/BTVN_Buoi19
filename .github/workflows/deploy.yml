name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Java Application with Maven
        run: |
          cd ASM
          chmod +x mvnw || true
          mvn clean package -DskipTests

      - name: Build and Run Application with Docker Compose
        run: |
          docker compose up -d --build

      - name: Verify Containers Status
        run: |
          sleep 15
          docker compose ps
          docker compose logs --tail=20
